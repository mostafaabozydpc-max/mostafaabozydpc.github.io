                <input type="email" id="user-email" placeholder="example@mail.com" required>
                 
                 <label for="message">اترك رسالتك هنا: </label>
                 <textarea rows="5" id="message" placeholder="كيف يمكننا مساعدتك " required ></textarea>

                 <button type="submit">ارسال</button>
